# Unitree Go2 — MuJoCo sim config (same policy, different backend)
robot: unitree_go2
xml_path: resources/go2/go2.xml  # download from unitreerobotics/unitree_mujoco

policy: policies/go2_locomotion.onnx
render: true

control_dt: 0.02
max_steps:  0
publish_every: 5

obs_dim: 48
action_dim: 12
action_scale: 0.25
vel_cmd_idx: 5

obs_scales:
  lin_vel:  2.0
  ang_vel:  0.25
  dof_pos:  1.0
  dof_vel:  0.05

mqtt_broker: broker.hivemq.com
mqtt_port:   1883
robot_id:    go2_sim
